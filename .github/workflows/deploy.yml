name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run Prisma migrations on Neon
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify migration
        run: npx prisma migrate status

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web application
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          set -e
          output=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$output"
          url=$(printf '%s
' "$output" | grep -oE 'https://[a-z0-9.-]+\.vercel\.app' | head -1)
          if [ -z "$url" ]; then
            echo "Could not determine deployment URL from Vercel CLI output"
            exit 1
          fi
          echo "deployment_url=$url" >> $GITHUB_OUTPUT

      - name: Set Vercel Environment Variables
        run: |
          set -e
          [ -n "${{ secrets.NEXT_PUBLIC_API_URL }}" ] && vercel env add NEXT_PUBLIC_API_URL production --value="${{ secrets.NEXT_PUBLIC_API_URL }}" --token=${{ secrets.VERCEL_TOKEN }} || true
          [ -n "${{ secrets.NEXT_PUBLIC_APP_URL }}" ] && vercel env add NEXT_PUBLIC_APP_URL production --value="${{ secrets.NEXT_PUBLIC_APP_URL }}" --token=${{ secrets.VERCEL_TOKEN }} || true
          vercel env add CLERK_PUBLISHABLE_KEY production --value=${{ secrets.CLERK_PUBLISHABLE_KEY }} --token=${{ secrets.VERCEL_TOKEN }} || true
          vercel env add CLERK_SECRET_KEY production --value=${{ secrets.CLERK_SECRET_KEY }} --token=${{ secrets.VERCEL_TOKEN }} || true
          vercel env add NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY production --value=${{ secrets.STRIPE_PUBLISHABLE_KEY }} --token=${{ secrets.VERCEL_TOKEN }} || true

      - name: Verify deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          set -e
          echo "Verifying web deployment at $DEPLOYMENT_URL..."
          timeout 300 bash -c 'until curl -f "${DEPLOYMENT_URL%/}/api/health/onboarding"; do sleep 10; done'
          echo "Web deployment is healthy!"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-web]
    if: always()
    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "OrgFlow Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*OrgFlow Deployment ${{ job.status }}*\n\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nDeployed by: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
