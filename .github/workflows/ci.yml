name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: janagana
          POSTGRES_PASSWORD: janagana
          POSTGRES_DB: janagana_v3
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U janagana -d janagana_v3"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://janagana:janagana@localhost:5432/janagana_v3?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3020
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CLERK_WEBHOOK_SECRET: whsec_ci_placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply schema
        run: npx prisma db push --skip-generate

      - name: Seed e2e tenants
        run: npm run seed:e2e

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Quick release gates (DB + scripts)
        run: npm run gate:quick
