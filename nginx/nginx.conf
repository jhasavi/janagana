worker_processes auto;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 100;
  types_hash_max_size 2048;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/rss+xml
    application/atom+xml
    image/svg+xml
    application/x-font-ttf
    font/opentype;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Upstream servers
  upstream janagana_api {
    server api:4000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream janagana_web {
    server web:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # HTTP to HTTPS redirect
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl http2;
    server_name _;

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers for HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Health check endpoint
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # API routes with rate limiting
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      limit_conn conn_limit 10;

      proxy_pass http://janagana_api/api/;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Connection "";

      # WebSocket support for SSE
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      # Buffering
      proxy_buffering off;
      proxy_cache off;
    }

    # Stripe webhook endpoint (no rate limiting)
    location /api/webhooks/stripe {
      proxy_pass http://janagana_api/api/webhooks/stripe;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    # Static files with caching
    location /_next/static/ {
      proxy_pass http://janagana_web/_next/static/;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      expires 365d;
      access_log off;
    }

    location /static/ {
      proxy_pass http://janagana_web/static/;
      proxy_cache_valid 200 30d;
      add_header Cache-Control "public, max-age=2592000";
      expires 30d;
      access_log off;
    }

    # Images with caching
    location /images/ {
      proxy_pass http://janagana_web/images/;
      proxy_cache_valid 200 7d;
      add_header Cache-Control "public, max-age=604800";
      expires 7d;
      access_log off;
    }

    # Favicon
    location = /favicon.ico {
      proxy_pass http://janagana_web/favicon.ico;
      proxy_cache_valid 200 7d;
      expires 7d;
      access_log off;
      log_not_found off;
    }

    # Robots.txt
    location = /robots.txt {
      proxy_pass http://janagana_web/robots.txt;
      proxy_cache_valid 200 1d;
      expires 1d;
      access_log off;
      log_not_found off;
    }

    # Main application
    location / {
      limit_req zone=general_limit burst=50 nodelay;
      limit_conn conn_limit 20;

      proxy_pass http://janagana_web;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Connection "";

      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      # Buffering
      proxy_buffering on;
      proxy_buffers 16 16k;
      proxy_buffer_size 32k;
    }
  }
}
