services:
  # Web Service (Next.js)
  - type: web
    name: janagana-web
    env: node
    buildCommand: cd apps/web && npm install && npm run build
    startCommand: cd apps/web && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        value: https://janagana.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://janagana-api.onrender.com
      - key: NEXT_PUBLIC_APP_DOMAIN
        value: janagana.onrender.com
      - key: NEXT_PUBLIC_ROOT_DOMAIN
        value: onrender.com
      - key: NEXT_PUBLIC_TENANT_FALLBACK
        value: demo
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        value: /dashboard
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        value: /dashboard
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false

  # API Service (NestJS)
  - type: web
    name: janagana-api
    env: node
    buildCommand: cd packages/database && npx prisma generate && cd ../apps/api && npm install && npm run build
    startCommand: cd apps/api && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: WEB_ORIGIN
        value: https://janagana.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://janagana.onrender.com
      - key: APP_URL
        value: https://janagana-api.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CONNECT_WEBHOOK_SECRET
        sync: false
      - key: PLATFORM_FEE_PERCENTAGE
        value: 2
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: CLOUDINARY_URL
        sync: false
